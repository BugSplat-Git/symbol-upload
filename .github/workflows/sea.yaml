name: Single Executable Application

on:
    push:
        tags:
        - 'v*'


jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-latest-large, windows-latest]
        include:
          - os: ubuntu-latest
            run_script: sea:linux
            artifact_name: symbol-upload-linux
            file_name: symbol-upload-linux
          - os: macos-latest
            run_script: sea:macos
            artifact_name: symbol-upload-macos
            file_name: symbol-upload-macos
          - os: macos-latest-large
            run_script: sea:macos
            artifact_name: symbol-upload-macos-intel
            file_name: symbol-upload-macos
          - os: windows-latest
            run_script: sea:windows
            artifact_name: symbol-upload-windows.exe
            file_name: symbol-upload-windows.exe
    
    steps:
    - name: ☑️ Checkout
      uses: actions/checkout@v6

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: 🏗️ Install Dependencies
      run: npm ci

    - name: 📦 Run Pkg
      run: npm run ${{ matrix.run_script }} # Executes the script based on the operating system

    - name: ⬆️ Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.file_name }} # Uploads the artifact with a platform-specific name and path

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: ⬇️ Download Artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts

    - name: 📦 Stage Release Assets
      run: |
        mkdir release
        cp artifacts/symbol-upload-linux/symbol-upload-linux release/symbol-upload-linux
        cp artifacts/symbol-upload-macos/symbol-upload-macos release/symbol-upload-macos
        cp artifacts/symbol-upload-macos-intel/symbol-upload-macos release/symbol-upload-macos-intel
        cp artifacts/symbol-upload-windows.exe/symbol-upload-windows.exe release/symbol-upload-windows.exe
        chmod +x release/symbol-upload-linux release/symbol-upload-macos release/symbol-upload-macos-intel

    - name: 🚀 Create Release
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ github.ref_name }}
      run: |
        PRERELEASE=""
        if [[ "$TAG" == *-* ]]; then
          PRERELEASE="--prerelease"
        fi
        if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          gh release upload "$TAG" release/* --repo "$GITHUB_REPOSITORY" --clobber
        else
          gh release create "$TAG" release/* --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes $PRERELEASE
        fi
